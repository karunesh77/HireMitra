name: HireMitra CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Code Quality & Security Checks
  # ─────────────────────────────────────────
  check:
    name: 🔍 Lint + Security Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 Run ESLint (code quality)
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: 🔒 Run Security Audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: 🏗️ Build check (make sure code compiles)
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ─────────────────────────────────────────
  # JOB 2: Deploy Frontend to Vercel
  # ─────────────────────────────────────────
  deploy-frontend:
    name: 🚀 Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔗 Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🏗️ Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🚀 Deploy to Vercel Production
        run: |
          for i in 1 2 3; do
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: ✅ Frontend Deployed
        run: echo "🎉 Frontend deployed to Vercel!"

  # ─────────────────────────────────────────
  # JOB 3: Deploy Backend to AWS Lambda
  # ─────────────────────────────────────────
  deploy-backend:
    name: ☁️ Deploy Backend to Lambda
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install backend dependencies
        working-directory: backend
        run: |
          mkdir -p lambda-deployment
          cp lambda.js package.json package-lock.json lambda-deployment/
          cp -r config controllers middleware models routes lambda-deployment/
          cd lambda-deployment
          npm ci --omit=dev

      - name: 🗜️ Create deployment zip
        working-directory: backend
        run: |
          cd lambda-deployment
          zip -r ../backend-lambda.zip .
          cd ..
          echo "✅ Zip size: $(du -h backend-lambda.zip | cut -f1)"

      - name: ☁️ Deploy to AWS Lambda
        uses: appleboy/lambda-action@v0.2.0
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: eu-north-1
          function_name: HireMitra-Backend
          zip_file: backend/backend-lambda.zip

      - name: ✅ Backend Deployed
        run: echo "🎉 Backend deployed to AWS Lambda!"
